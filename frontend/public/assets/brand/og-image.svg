<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Come Color With Me — Open Graph image">
  <!--
    DESIGN SOURCE — Open Graph / social share card (1200 × 630)
    Export to PNG at 1×  before uploading to social platforms.
    Twitter/X requires raster; LinkedIn, Facebook accept both.
    Fonts: Bubblegum Sans (embed or outline before print export).
  -->
  <defs>
    <linearGradient id="blobL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="blobR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&amp;family=Nunito:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#FFF6F9"/>

  <!-- Corner blob — top-left -->
  <circle cx="-60" cy="-60" r="300" fill="url(#blobL)" opacity="0.55"/>
  <!-- Corner blob — bottom-right -->
  <circle cx="1260" cy="690" r="340" fill="url(#blobR)" opacity="0.50"/>

  <!-- Scattered paint dots -->
  <circle cx="610" cy="38"  r="9"  fill="#F472B6" opacity="0.28"/>
  <circle cx="780" cy="590" r="7"  fill="#9B6FD4" opacity="0.28"/>
  <circle cx="1110" cy="180" r="11" fill="#C4B5FD" opacity="0.38"/>
  <circle cx="950" cy="540" r="8"  fill="#FDBA74" opacity="0.32"/>
  <circle cx="1050" cy="420" r="5"  fill="#F472B6" opacity="0.25"/>
  <circle cx="640" cy="570" r="6"  fill="#93C5FD" opacity="0.30"/>

  <!-- Sparkle — top-right area -->
  <path d="M 1120 80 L 1124 96 L 1140 100 L 1124 104 L 1120 120 L 1116 104 L 1100 100 L 1116 96 Z"
        fill="#F472B6" opacity="0.55"/>
  <!-- Sparkle — lower left area -->
  <path d="M 90 500 L 93 512 L 105 515 L 93 518 L 90 530 L 87 518 L 75 515 L 87 512 Z"
        fill="#9B6FD4" opacity="0.45"/>

  <!-- ─── Icon mark (left column) ───────────────────────────── -->
  <!-- 64×64 icon at scale 4.5 = 288×288, centered vertically: y=(630-288)/2=171, x offset=70 -->
  <g transform="translate(60,171) scale(4.5)">
    <!-- Background circle for icon -->
    <circle cx="32" cy="32" r="32" fill="#EDE9FE"/>
    <!-- Palette body -->
    <path d="M 11 36 C 10 23 19 11 33 11 C 47 10 57 20 56 33 C 55 44 47 54 33 54 C 20 54 12 46 11 36 Z"
          fill="white" stroke="#9B6FD4" stroke-width="2" stroke-linejoin="round"/>
    <!-- Thumb hole -->
    <ellipse cx="42" cy="46" rx="6" ry="5" fill="#EDE9FE" stroke="#9B6FD4" stroke-width="1.8"/>
    <!-- Paint blobs -->
    <circle cx="22" cy="28" r="5.5" fill="#F472B6"/>
    <circle cx="33" cy="20" r="5"   fill="#9B6FD4"/>
    <circle cx="44" cy="27" r="4.5" fill="#93C5FD"/>
    <circle cx="25" cy="40" r="4"   fill="#FDBA74"/>
    <!-- Star -->
    <path d="M 54 9 L 55.5 12.5 L 59 14 L 55.5 15.5 L 54 19 L 52.5 15.5 L 49 14 L 52.5 12.5 Z"
          fill="#F472B6"/>
    <circle cx="9" cy="50" r="2.5" fill="#C4B5FD" opacity="0.8"/>
  </g>

  <!-- ─── Wordmark (right column, x from ~420) ──────────────── -->
  <text x="420" y="240"
        font-family="'Bubblegum Sans','Comic Sans MS',cursive"
        font-size="90" fill="#9B6FD4" letter-spacing="1">Come Color</text>

  <text x="420" y="344"
        font-family="'Bubblegum Sans','Comic Sans MS',cursive"
        font-size="90" fill="#F472B6" letter-spacing="1">With Me&#x2122;</text>

  <!-- Decorative squiggle under wordmark -->
  <path d="M 420 362 Q 488 374 556 362 Q 624 350 692 362 Q 760 374 828 362"
        fill="none" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="420" y="430"
        font-family="'Nunito','Arial',sans-serif"
        font-size="28" font-weight="600" fill="#8B7BA8" letter-spacing="0.2">
    Free coloring pages &amp; premium art prints
  </text>
  <text x="420" y="466"
        font-family="'Nunito','Arial',sans-serif"
        font-size="28" font-weight="600" fill="#8B7BA8" letter-spacing="0.2">
    by Amalia, age 8.
  </text>

  <!-- URL -->
  <text x="420" y="540"
        font-family="'Nunito','Arial',sans-serif"
        font-size="22" fill="#C4B5FD" letter-spacing="0.3">comecolorwith.me</text>

  <!-- Small paint dot by URL -->
  <circle cx="395" cy="534" r="7" fill="#9B6FD4" opacity="0.4"/>
</svg>
