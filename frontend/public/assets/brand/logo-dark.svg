<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Come Color With Me logo — dark">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&amp;display=swap');
    </style>
  </defs>

  <!-- Icon mark — single Deep Plum #3D1F5C -->
  <g transform="translate(8,8)">
    <path d="M 11 36 C 10 23 19 11 33 11 C 47 10 57 20 56 33 C 55 44 47 54 33 54 C 20 54 12 46 11 36 Z"
          fill="rgba(61,31,92,0.08)" stroke="#3D1F5C" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="42" cy="46" rx="6" ry="5" fill="white" stroke="#3D1F5C" stroke-width="2"/>
    <!-- Paint blobs — varying opacities of Deep Plum -->
    <circle cx="22" cy="28" r="5.5" fill="#3D1F5C" opacity="0.9"/>
    <circle cx="33" cy="20" r="5"   fill="#3D1F5C" opacity="0.65"/>
    <circle cx="44" cy="27" r="4.5" fill="#3D1F5C" opacity="0.75"/>
    <circle cx="25" cy="40" r="4"   fill="#3D1F5C" opacity="0.5"/>
    <!-- Star -->
    <path d="M 54 9 L 55.5 12.5 L 59 14 L 55.5 15.5 L 54 19 L 52.5 15.5 L 49 14 L 52.5 12.5 Z"
          fill="#3D1F5C"/>
    <circle cx="9" cy="50" r="2.5" fill="#3D1F5C" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="36"
        font-family="'Bubblegum Sans','Comic Sans MS',cursive"
        font-size="27" fill="#3D1F5C" letter-spacing="0.3">Come Color</text>

  <text x="90" y="65"
        font-family="'Bubblegum Sans','Comic Sans MS',cursive"
        font-size="27" fill="#3D1F5C" opacity="0.75" letter-spacing="0.3">With Me&#x2122;</text>

  <!-- Squiggle -->
  <path d="M 90 70 Q 120 76 152 70 Q 182 64 214 70"
        fill="none" stroke="#3D1F5C" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
</svg>
