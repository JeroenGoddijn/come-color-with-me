<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160" role="img" aria-label="Come Color With Me logo — stacked">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&amp;display=swap');
    </style>
  </defs>

  <!-- Icon centered at top (80×80, offset so center = 110,48) -->
  <g transform="translate(70,4)">
    <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
    <path d="M 11 36 C 10 23 19 11 33 11 C 47 10 57 20 56 33 C 55 44 47 54 33 54 C 20 54 12 46 11 36 Z"
          fill="white" stroke="#9B6FD4" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="42" cy="46" rx="6" ry="5" fill="url(#bg)" stroke="#9B6FD4" stroke-width="2"/>
    <circle cx="22" cy="28" r="5.5" fill="#F472B6"/>
    <circle cx="33" cy="20" r="5"   fill="#9B6FD4"/>
    <circle cx="44" cy="27" r="4.5" fill="#93C5FD"/>
    <circle cx="25" cy="40" r="4"   fill="#FDBA74"/>
    <path d="M 54 9 L 55.5 12.5 L 59 14 L 55.5 15.5 L 54 19 L 52.5 15.5 L 49 14 L 52.5 12.5 Z"
          fill="#F472B6"/>
    <circle cx="9" cy="50" r="2.5" fill="#C4B5FD" opacity="0.8"/>
  </g>

  <!-- Wordmark centered -->
  <text x="110" y="104"
        text-anchor="middle"
        font-family="'Bubblegum Sans','Comic Sans MS',cursive"
        font-size="26" fill="#9B6FD4" letter-spacing="0.3">Come Color</text>

  <text x="110" y="133"
        text-anchor="middle"
        font-family="'Bubblegum Sans','Comic Sans MS',cursive"
        font-size="26" fill="#F472B6" letter-spacing="0.3">With Me&#x2122;</text>

  <!-- Centered squiggle -->
  <path d="M 55 140 Q 82 146 110 140 Q 138 134 165 140"
        fill="none" stroke="#C4B5FD" stroke-width="2.2" stroke-linecap="round"/>
</svg>
