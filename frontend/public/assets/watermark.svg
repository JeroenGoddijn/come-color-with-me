<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-label="Come Color With Me — preview watermark">
  <defs>
    <!--
      Watermark — Come Color With Me
      Variant: Corner + Whisper
      Usage: overlay on premium artwork preview images (1200×1500px)
      In React: <WatermarkOverlay /> composites this SVG over the preview image
                when artwork.watermark_enabled = true
    -->

    <!-- Full-image diagonal whisper — prevents clean cropping of any corner -->
    <pattern id="whisper" x="0" y="0" width="400" height="130"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(-35 600 750)">
      <text x="0" y="62"
            font-family="Georgia, 'Times New Roman', serif"
            font-size="22"
            letter-spacing="4"
            fill="#3D1F5C"
            fill-opacity="0.18">Come Color With Me  ✦</text>
    </pattern>
  </defs>

  <!-- Light full-image whisper (anti-crop) -->
  <rect width="1200" height="1500" fill="url(#whisper)"/>

  <!-- ── Top-right pill tag ──────────────────────────────────── -->
  <g transform="translate(1060, 58)">
    <rect x="-164" y="-26" width="328" height="52" rx="26"
          fill="#9B6FD4" fill-opacity="0.82"/>
    <text x="-80" y="11"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="21"
          font-weight="bold"
          letter-spacing="3"
          fill="white"
          fill-opacity="0.97">✦  PREVIEW</text>
  </g>

  <!-- ── Bottom-left pill tag ───────────────────────────────── -->
  <g transform="translate(152, 1442)">
    <rect x="-128" y="-26" width="256" height="52" rx="26"
          fill="#9B6FD4" fill-opacity="0.82"/>
    <text x="-46" y="11"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="21"
          font-weight="bold"
          letter-spacing="3"
          fill="white"
          fill-opacity="0.97">✦  PREVIEW</text>
  </g>
</svg>
