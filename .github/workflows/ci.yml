name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  check-assets:
    name: Asset Integrity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run check-assets

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test -w backend

  test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run test -w frontend

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, check-assets]
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8055
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_ANALYTICS_ENABLED: 'false'
      NEXT_PUBLIC_DEFAULT_FLAGS: '{"ENABLE_PREMIUM_PRINTS":false,"ENABLE_COLORING_CLUB":false,"ENABLE_ACCOUNT_DOWNLOADS":true,"ENABLE_NEWSLETTER":true,"ENABLE_WATERMARKS":true,"ENABLE_CART":false,"ENABLE_CHECKOUT":false,"ENABLE_ARTIST_UPLOADS":false,"ENABLE_GAMIFICATION":false,"ENABLE_THEME_PLAYFUL":false,"ENABLE_THEME_WHIMSICAL":true}'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run check-assets
      - run: npm run build
